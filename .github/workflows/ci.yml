name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run local link checker
        run: |
          python3 - <<'PY'
          import os, sys
          from html.parser import HTMLParser
          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links=[]
              def handle_starttag(self, tag, attrs):
                  attrs=dict(attrs)
                  if tag=='a' and 'href' in attrs:
                      self.links.append(attrs['href'])
                  if tag in ('img','script') and 'src' in attrs:
                      self.links.append(attrs['src'])
                  if tag=='link' and 'href' in attrs:
                      self.links.append(attrs['href'])
          parser=LinkParser()
          root=os.getcwd()
          missing={}
          for dirpath,_,filenames in os.walk(root):
              for fn in filenames:
                  if fn.lower().endswith('.html'):
                      path=os.path.join(dirpath,fn)
                      try:
                          with open(path,'rb') as f:
                              text=f.read().decode('utf-8',errors='replace')
                      except Exception:
                          continue
                      parser.links=[]
                      parser.feed(text)
                      for href in parser.links:
                          if not href:
                              continue
                          if href.startswith(('http://','https://','//','mailto:','tel:','data:','#','javascript:')):
                              continue
                          href_clean=href.split('?',1)[0].split('#',1)[0]
                          if href_clean.startswith('/'):
                              check=os.path.join(root, href_clean.lstrip('/'))
                          else:
                              check=os.path.join(dirpath, href_clean)
                          if os.path.isdir(check):
                              check=os.path.join(check,'index.html')
                          if not os.path.exists(check):
                              missing.setdefault(os.path.relpath(path, root),[]).append(href)
          if missing:
              print('Missing local links:')
              for page,links in missing.items():
                  print(f"{page}:")
                  for l in links:
                      print('  -', l)
              sys.exit(1)
          print('OK: No missing local links found')
          PY

  html-lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install htmlhint
        run: npm install -g htmlhint
      - name: Run htmlhint
        run: htmlhint "**/*.html"
