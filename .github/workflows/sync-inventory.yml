name: Sync Airtable Inventory

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Fetch & commit inventory.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch all Airtable pages
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          BASE_ID: appc8wJr5Mn1sxzzZ
          TABLE_NAME: Vehicles
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.parse

          token      = os.environ["AIRTABLE_TOKEN"]
          base_id    = os.environ["BASE_ID"]
          table_name = urllib.parse.quote(os.environ["TABLE_NAME"])
          headers    = {"Authorization": f"Bearer {token}"}

          records = []
          offset  = None

          while True:
              url = f"https://api.airtable.com/v0/{base_id}/{table_name}?pageSize=100"
              if offset:
                  url += f"&offset={offset}"
              req  = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              records.extend(data.get("records", []))
              offset = data.get("offset")
              if not offset:
                  break

          with open("inventory.json", "w") as f:
              json.dump({"records": records, "generated": __import__("datetime").datetime.utcnow().isoformat() + "Z"}, f)

          print(f"Wrote {len(records)} records to inventory.json")
          PY

      - name: Commit inventory.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inventory.json
          if git diff --cached --quiet; then
            echo "No changes — inventory is up to date"
          else
            git commit -m "chore: sync Airtable inventory [skip ci]"
            git push
          fi
